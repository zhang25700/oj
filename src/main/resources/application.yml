server:
  port: 8101

spring:
  application:
    name: online-judge
  datasource:
    url: jdbc:mysql://localhost:3306/oj?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
    username: oj
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456
      database: 0
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: 123456
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

oj:
  sandbox:
    docker:
      java-image: eclipse-temurin:17-jdk
      cpp-image: gcc:14
      c-image: gcc:14
      workspace: /workspace
      cpus: 1.0
      compile-timeout-ms: 10000
      extra-timeout-ms: 2000
      pids-limit: 128
      availability-check-interval-ms: 30000
      prewarm-images: true
      startup-timeout-ms: 20000
      compile-memory-limit-mb: 512
